[build]
  cmd = "go build -o ./tmp/server ./cmd/main.go"
  bin = "./tmp/server"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor"]
  delay = 1000
  # Poll-based watching required for Docker volumes on Windows
  poll = true
  poll_interval = 1000

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
